<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0d1015">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Monopoly — 1v1</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
<style>
:root{
  color-scheme:dark; /* declare we're already dark so browsers don't apply auto-darkening filters */
  --brown:#955436; --lblue:#aae0fa; --pink:#d93a96; --orange:#f7941d;
  --red:#ed1b24; --yellow:#fef200; --green:#1fb25a; --dblue:#0072bb;
  --board-bg:#cde6d0; --cell-bg:#cde6d0; --line:#1b1b1b;
  --p0:#2f6fd0; --p1:#d04b2f; --p2:#1f9e57; --p3:#a05fd6;
  --ui-bg:#12161c; --panel:#1c232d; --panel2:#242d3a; --text:#e8e6df;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:var(--ui-bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; overflow:hidden;
}
header{
  display:flex; align-items:center; gap:14px; padding:8px 16px;
  background:#0d1015; border-bottom:1px solid #2a3340; flex:0 0 auto;
}
header h1{font-size:20px; letter-spacing:2px; color:#f0483c; font-weight:900;}
header .sub{color:#9aa5b1; font-size:13px;}
header .spacer{flex:1;}
header button{
  background:var(--panel2); color:var(--text); border:1px solid #3a4656;
  padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px;
}
header button:hover{background:#2f3b4b;}
#updatebar{
  display:none; background:#4a3d10; border-bottom:1px solid #8a7420; color:#ffe08a;
  padding:8px 16px; font-size:13px; flex:0 0 auto;
}
#updatebar button{
  background:#8a7420; color:#fff; border:none; border-radius:6px;
  padding:4px 12px; cursor:pointer; font-weight:700; margin-left:8px; font-size:13px;
}
#updatebar button:hover{background:#a58a26;}
main{flex:1; display:flex; gap:14px; padding:12px; min-height:0;}
/* ---------- BOARD ---------- */
#boardwrap{flex:1; display:flex; align-items:center; justify-content:center; min-width:0;}
#board{
  aspect-ratio:1; height:100%; max-height:100%; max-width:100%;
  display:grid;
  grid-template-columns:1.45fr repeat(9,1fr) 1.45fr;
  grid-template-rows:1.45fr repeat(9,1fr) 1.45fr;
  background:var(--line); gap:1.5px; border:3px solid var(--line);
  border-radius:4px; user-select:none;
}
.cell{
  background:var(--cell-bg); position:relative; display:flex; overflow:hidden;
  cursor:pointer; color:#111;
}
.cell:hover{filter:brightness(1.06);}
.cell.active{outline:3px solid #ffd54a; outline-offset:-3px; z-index:2;}
.cell .bar{flex:0 0 24%; position:relative; display:flex; align-items:center; justify-content:center; border:0 solid var(--line);}
.cell.bottom{flex-direction:column;} .cell.bottom .bar{border-bottom-width:1.5px;}
.cell.top{flex-direction:column-reverse;} .cell.top .bar{border-top-width:1.5px;}
.cell.left{flex-direction:row-reverse;} .cell.left .bar{border-left-width:1.5px;}
.cell.right{flex-direction:row;} .cell.right .bar{border-right-width:1.5px;}
.cell .body{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:3px 2px; text-align:center; min-width:0;}
.cell .nm{font-size:8.5px; font-weight:700; line-height:1.15; text-transform:uppercase; letter-spacing:.2px;}
.cell .pr{font-size:8.5px; font-weight:600;}
.cell .ic{font-size:20px; line-height:1;}
.cell.corner{align-items:center; justify-content:center; flex-direction:column; gap:2px; text-align:center;}
.cell.corner .nm{font-size:10px;}
.cell.corner .ic{font-size:26px;}
.houses{display:flex; gap:2px;}
.houses .h{
  width:10px; height:10px; background:#3ddc63; border:1.5px solid #fff; border-radius:2px;
  box-shadow:0 1px 3px rgba(0,0,0,.65);
}
.houses .hotel{
  width:22px; height:12px; background:#ff2d3f; border:1.5px solid #fff; border-radius:2px;
  box-shadow:0 1px 3px rgba(0,0,0,.65);
}
.cell.left .houses,.cell.right .houses{flex-direction:column;}
.cell.left .houses .hotel,.cell.right .houses .hotel{width:12px; height:22px;}
.tok{position:absolute; bottom:2px; left:0; right:0; display:flex; justify-content:center; gap:2px; pointer-events:none; z-index:3; flex-wrap:wrap;}
.cell.top .tok{bottom:auto; top:2px;}
.cell.left .tok,.cell.right .tok{bottom:auto; top:50%; transform:translateY(-50%);}
.cell.left .tok{right:26%;}
.cell.right .tok{left:26%;}
.tokb{
  width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,.97);
  display:flex; align-items:center; justify-content:center; font-size:14px; line-height:1;
  box-shadow:0 2px 6px rgba(0,0,0,.55);
}
.tokb.t0{border:2.5px solid var(--p0);}
.tokb.t1{border:2.5px solid var(--p1);}
.tokb.t2{border:2.5px solid var(--p2);}
.tokb.t3{border:2.5px solid var(--p3);}
.cell.own0{box-shadow:inset 0 0 0 3px var(--p0);}
.cell.own1{box-shadow:inset 0 0 0 3px var(--p1);}
.cell.own2{box-shadow:inset 0 0 0 3px var(--p2);}
.cell.own3{box-shadow:inset 0 0 0 3px var(--p3);}
.cell.mtg::after{
  content:"MTG"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-20deg);
  background:rgba(40,40,40,.82); color:#fff; font-size:9px; font-weight:800; padding:1px 5px; border-radius:3px; z-index:2;
}
.cell.mtg{filter:grayscale(.75);}
.bg-brown{background:var(--brown);} .bg-lblue{background:var(--lblue);} .bg-pink{background:var(--pink);}
.bg-orange{background:var(--orange);} .bg-red{background:var(--red);} .bg-yellow{background:var(--yellow);}
.bg-green{background:var(--green);} .bg-dblue{background:var(--dblue);}
#center{
  grid-area:2/2/11/11; background:var(--board-bg); position:relative;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
#center .logo{
  background:var(--red); color:#fff; font-weight:900; font-size:clamp(20px,3.4vw,40px);
  letter-spacing:4px; padding:6px 26px; border:2px solid #111; transform:rotate(-12deg);
  box-shadow:3px 3px 0 rgba(0,0,0,.35); font-family:Georgia,serif;
}
#center .vs{color:#333; font-size:13px; font-weight:700; transform:rotate(-12deg); margin-top:-6px;}
#dicebox{display:flex; gap:14px; margin-top:8px;}
.die{
  width:52px; height:52px; background:#fffdf5; border:2px solid #222; border-radius:9px;
  display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
  padding:6px; gap:1px; box-shadow:0 3px 6px rgba(0,0,0,.3);
}
.die i{border-radius:50%; background:#161616; opacity:0; margin:1.5px;}
.die.rolling{animation:shake .12s infinite;}
@keyframes shake{0%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}100%{transform:rotate(-6deg)}}
#dicebox.canroll{cursor:pointer;}
#dicebox.canroll .die{animation:diceglow 1.1s infinite;}
@keyframes diceglow{0%,100%{box-shadow:0 3px 6px rgba(0,0,0,.3);}50%{box-shadow:0 0 16px 5px rgba(255,180,40,.85);}}
#dicehint{font-size:12.5px; font-weight:700; color:#7a5c00; min-height:16px;}
.abtn.pulse{border-color:#ffd54a; animation:btnpulse 1.2s infinite;}
@keyframes btnpulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 10px 2px rgba(255,213,74,.55);}}
.pcard.bank{border-style:dashed; border-color:#3a4656;}
.pcard.bank .pname{color:#c8b45a;}
#turnbanner{font-size:14px; font-weight:700; color:#222; background:rgba(255,255,255,.55); padding:4px 14px; border-radius:20px; border:1px solid #999;}
#cardshow{
  display:none; background:#fffef2; color:#222; border:2px solid #333; border-radius:8px;
  width:72%; max-width:280px; padding:12px 14px; text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.35);
}
#cardshow .ct{font-weight:900; font-size:12px; letter-spacing:2px; margin-bottom:6px;}
#cardshow .cb{font-size:13px; line-height:1.4;}
/* ---------- SIDEBAR ---------- */
aside{flex:0 0 340px; display:flex; flex-direction:column; gap:10px; min-height:0;}
#players{overflow-y:auto; flex:0 1 auto; display:flex; flex-direction:column; gap:8px;}
.pcard{
  background:var(--panel); border:1px solid #2c3644; border-radius:10px; padding:8px 12px; flex:0 0 auto;
}
.pcard.turn{border-color:#ffd54a; box-shadow:0 0 0 1px #ffd54a;}
.pcard.dead{opacity:.45; filter:grayscale(.8);}
.pcard .top{display:flex; align-items:center; gap:8px;}
.pcard .tokbig{font-size:20px;}
.pcard .pname{font-weight:800; font-size:14px;}
.pcard .cash{margin-left:auto; font-weight:800; font-size:16px; color:#7ee081;}
.pcard .meta{color:#93a0ae; font-size:11px; margin-top:2px;}
.chips{display:flex; flex-wrap:wrap; gap:3px; margin-top:6px;}
.chip{
  width:16px; height:21px; border-radius:3px; border:1px solid #000; cursor:pointer;
  display:flex; align-items:flex-end; justify-content:center; font-size:8px; color:#fff; font-weight:800;
  position:relative;
}
.chip.cm{opacity:.45;}
.chip .hc{position:absolute; top:1px; left:0; right:0; text-align:center; font-size:8px; color:#fff; text-shadow:0 0 2px #000;}
.chip.rrchip,.chip.utchip{background:#555; color:#fff; font-size:9px; align-items:center;}
#actions{display:flex; flex-wrap:wrap; gap:8px; min-height:44px; align-content:flex-start;}
.abtn{
  background:var(--panel2); color:var(--text); border:1px solid #3a4656; border-radius:8px;
  padding:10px 14px; font-size:14px; font-weight:700; cursor:pointer;
}
.abtn:hover:not(:disabled){background:#334052;}
.abtn:disabled{opacity:.4; cursor:default;}
.abtn.primary{background:#1f6f43; border-color:#2f9c60;}
.abtn.primary:hover{background:#268553;}
.abtn.danger{background:#7a2b22; border-color:#a53b2e;}
.abtn.danger:hover{background:#93362a;}
#status{font-size:13px; color:#c8b45a; min-height:18px; font-style:italic;}
#log{
  flex:1; background:#0e1319; border:1px solid #2c3644; border-radius:10px;
  padding:10px; overflow-y:auto; font-size:12.5px; line-height:1.55; min-height:80px;
}
#log .l0{color:#8db8f5;} #log .l1{color:#f0a08c;} #log .l2{color:#8ce0a8;} #log .l3{color:#cfa6f2;}
#log .lg{color:#9aa5b1;} #log .lq{color:#d9c06a; font-style:italic;}
#log div{margin-bottom:2px;}
/* ---------- EVENT TOASTS ---------- */
#toasts{
  position:fixed; top:64px; left:50%; transform:translateX(-50%); z-index:70;
  display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none;
}
.toast{
  background:#1c232d; border:1px solid #3a4656; border-left:5px solid #8a94a0;
  color:var(--text); padding:10px 18px; border-radius:10px; font-size:14.5px; font-weight:700;
  box-shadow:0 8px 24px rgba(0,0,0,.55); max-width:540px; text-align:center; line-height:1.45;
  animation:toastin .25s ease-out;
}
.toast small{display:block; font-weight:400; font-size:12px; color:#aeb9c6;}
.toast.good{border-left-color:#2f9c60; background:#132419;}
.toast.bad{border-left-color:#c8302e; background:#2a1512;}
.toast.jail{border-left-color:#4a7fd4; background:#131c2c;}
.toast.info{border-left-color:#c8b45a;}
.toast.out{animation:toastout .3s forwards;}
@keyframes toastin{from{opacity:0; transform:translateY(-12px);}to{opacity:1; transform:none;}}
@keyframes toastout{to{opacity:0; transform:translateY(-8px);}}
/* ---------- MODALS ---------- */
#overlay{
  position:fixed; inset:0; background:rgba(5,8,12,.72); display:none;
  align-items:center; justify-content:center; z-index:50;
}
#overlay.show{display:flex;}
#modal{
  background:var(--panel); border:1px solid #3a4656; border-radius:14px;
  max-width:560px; width:92%; max-height:86vh; overflow-y:auto; padding:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}
#modal h2{font-size:18px; margin-bottom:12px;}
#modal h3{font-size:14px; margin:10px 0 6px; color:#aeb9c6;}
.mbtns{display:flex; gap:8px; flex-wrap:wrap; margin-top:16px;}
.deed{
  background:#fffef4; color:#111; border:2px solid #222; border-radius:8px; overflow:hidden; margin-bottom:8px;
}
.deed .dh{padding:8px; text-align:center; font-weight:900; text-transform:uppercase; font-size:14px; border-bottom:2px solid #222; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4);}
.deed .dh.lightink{color:#111; text-shadow:none;}
.deed table{width:100%; font-size:12.5px; border-collapse:collapse;}
.deed td{padding:3px 12px;}
.deed td:last-child{text-align:right; font-weight:700;}
.deed .foot{padding:6px 12px; font-size:11px; color:#444; border-top:1px solid #ccc;}
.mrow{
  display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:8px;
  background:var(--panel2); margin-bottom:5px; font-size:13px;
}
.mrow .sq{width:14px; height:18px; border-radius:2px; border:1px solid #000; flex:0 0 auto;}
.mrow .mn{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.mrow button{
  background:#334052; border:1px solid #46566c; color:var(--text); border-radius:6px;
  padding:4px 8px; font-size:11.5px; cursor:pointer; white-space:nowrap;
}
.mrow button:hover:not(:disabled){background:#3d4c62;}
.mrow button:disabled{opacity:.35; cursor:default;}
.tradecols{display:flex; gap:14px;}
.tradecols>div{flex:1; min-width:0;}
.trow{display:flex; align-items:center; gap:7px; font-size:12.5px; padding:4px 6px; border-radius:6px;}
.trow:hover{background:var(--panel2);}
.trow input[type=checkbox]{accent-color:#2f9c60;}
.trow .sq{width:12px; height:16px; border-radius:2px; border:1px solid #000;}
.cashin{width:90px; background:#0e1319; border:1px solid #3a4656; color:var(--text); border-radius:6px; padding:6px 8px; font-size:13px;}
.namein{width:100%; background:#0e1319; border:1px solid #3a4656; color:var(--text); border-radius:8px; padding:10px; font-size:14px; margin:6px 0;}
.codebig{font-size:34px; letter-spacing:8px; font-weight:900; color:#ffd54a; text-align:center; background:#0e1319; border:1px dashed #3a4656; border-radius:10px; padding:14px; margin:12px 0; user-select:all; cursor:pointer;}
.tokpick{display:flex; gap:10px; flex-wrap:wrap; margin:14px 0;}
.tokpick button{font-size:30px; background:var(--panel2); border:2px solid #3a4656; border-radius:12px; padding:10px 14px; cursor:pointer;}
.tokpick button:hover{border-color:#ffd54a; background:#2f3b4b;}
.tokpick button.sel{border-color:#ffd54a; background:#3a4656;}
.tokpick.small button{font-size:15px; font-weight:800; color:var(--text); padding:10px 16px;}
.bigbtn{display:block; width:100%; text-align:left; background:var(--panel2); border:1px solid #3a4656; border-radius:12px; padding:14px 16px; color:var(--text); font-size:15px; font-weight:700; cursor:pointer; margin-bottom:10px;}
.bigbtn:hover{border-color:#ffd54a; background:#2f3b4b;}
.bigbtn small{display:block; color:#93a0ae; font-weight:400; font-size:12px; margin-top:3px;}
.debtbar{background:#5a1f18; border:1px solid #a53b2e; border-radius:8px; padding:10px 12px; font-weight:700; margin-bottom:10px; color:#ffb4a6;}
.bidrow{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:12px;}
.lobbyrow{display:flex; align-items:center; gap:10px; background:var(--panel2); border-radius:8px; padding:8px 12px; margin-bottom:6px; font-size:14px;}
#gameover-banner{font-size:40px; text-align:center; margin:8px 0;}
@media (max-width:980px){
  main{flex-direction:column; overflow-y:auto;}
  #boardwrap{min-height:92vw;}
  aside{flex:1 1 auto;}
  body{overflow:auto;}
}
</style>
</head>

<header>
  <h1>MONOPOLY</h1>
  <span class="sub">2–4 players · vs Claude bots or friends online · <span id="ver"></span></span>
  <span class="spacer"></span>
  <button id="btn-snd" title="Sound on/off">🔊</button>

<main>

    <div id="actions"></div>
    <div id="log"></div>

</main>
<div id="toasts"></div>
<div id="overlay"><div id="modal"></div></div>

const QUIPBAGS={};
function persona(pl){return PERSONAS[pl.name]||PERSONAS['Claude'];}
// speak a persona line for a situation; lines never repeat until the whole pool is used
function say(pl,cat,chance){
  if(!pl||!pl.ai)return;
  if(chance!==undefined&&Math.random()>chance)return;
  const pool=persona(pl).lines[cat];
  if(!pool||!pool.length)return;
  const key=pl.name+'|'+cat;
  let bag=QUIPBAGS[key];
  if(!bag||bag.length===0){
    bag=shuffle([...pool.keys()]);
    if(bag.length>1&&bag[0]===QUIPBAGS[key+':last'])bag.push(bag.shift()); // no instant repeats across reshuffles
    QUIPBAGS[key]=bag;
  }
  const idx=bag.shift();
  QUIPBAGS[key+':last']=idx;
  log(pl.name+': “'+pool[idx].replace(/\{tok\}/g,pl.token)+'”','q');
}

const SND={enabled:(function(){try{return localStorage.getItem('mono_snd')!=='off';}catch(e){return true;}})(),ctx:null};
function tone(f,t0,dur,type,vol){
  const c=SND.ctx,o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(vol||.12,c.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+t0+dur);
  o.connect(g);g.connect(c.destination);
  o.start(c.currentTime+t0);o.stop(c.currentTime+t0+dur+.02);
}
function sfx(name){
  if(!SND.enabled)return;
  try{
    SND.ctx=SND.ctx||new (window.AudioContext||window.webkitAudioContext)();
    if(SND.ctx.state==='suspended')SND.ctx.resume();
    switch(name){
      case 'dice': for(let i=0;i<5;i++)tone(180+Math.random()*220,i*.06,.04,'square',.05); break;
      case 'cash': tone(660,0,.09,'triangle',.13);tone(880,.09,.12,'triangle',.13); break;
      case 'pay': tone(440,0,.09,'triangle',.11);tone(300,.09,.14,'triangle',.11); break;

      case 'jail': tone(150,0,.3,'sawtooth',.09);tone(110,.15,.35,'sawtooth',.09); break;

/* ================= NET =================
 mode 'solo': all local; seat 0 = you, other seats = Claude bots.
 mode 'host': this machine runs all game logic; guests are remote seats.
 mode 'guest': pure mirror — renders synced state, answers the host's requests. */
const NET={mode:'solo',seat:0,peer:null,conns:{},lobby:[],maxPlayers:2,pending:{},reqId:0,manageSession:null,manageRerender:null,activeReq:false,awaitingHello:false,gotVer:false,hostName:'',hostToken:''};
function hostBroadcast(m){for(const k in NET.conns){const c=NET.conns[k];if(c&&c.open)try{c.send(m);}catch(e){}}}
function hostSendTo(seat,m){const c=NET.conns[seat];if(c&&c.open)try{c.send(m);}catch(e){}}
function guestSend(m){const k=Object.keys(NET.conns)[0];const c=k!==undefined?NET.conns[k]:null;if(c&&c.open)try{c.send(m);}catch(e){}}
function rpc(seat,msg){
  return new Promise(res=>{
    const id=++NET.reqId;
    NET.pending[id]={res:res,seat:seat};
    hostSendTo(seat,Object.assign({t:'req',id:id},msg));
  });
}
function resolvePendingFor(seat){
  for(const id in NET.pending){
    if(NET.pending[id].seat===seat){const f=NET.pending[id].res;delete NET.pending[id];try{f(null);}catch(e){}}
  }
}
function isLocalSeat(pid){return pid===NET.seat;}
function online(){return NET.mode!=='solo';}
function teardownNet(){
  stopHeartbeat();
  for(const k in NET.conns){try{NET.conns[k].close();}catch(e){}}
  try{if(NET.peer)NET.peer.destroy();}catch(e){}
  NET.mode='solo';NET.seat=0;NET.peer=null;NET.conns={};NET.lobby=[];NET.pending={};
  NET.manageSession=null;NET.manageRerender=null;NET.activeReq=false;NET.awaitingHello=false;NET.gotVer=false;
}
/* heartbeat: peers exchange pings so a silently-dead connection (sleeping laptop,
   backgrounded phone) is detected within ~1 minute instead of hanging the game.
   The 70s timeout tolerates browsers throttling background-tab timers to 1/min. */
const HB_INTERVAL=5000, HB_TIMEOUT=70000;
function startHeartbeat(){
  stopHeartbeat();
  NET.hbTimer=setInterval(()=>{
    if(!state||state.over)return;
    const now=Date.now();
    if(NET.mode==='host'){
      hostBroadcast({t:'hb'});
      for(const k in NET.conns){
        const c=NET.conns[k];
        if(!c)continue;
        if(!c._lastSeen)c._lastSeen=now;
        if(now-c._lastSeen>HB_TIMEOUT){try{c.close();}catch(e){}} // close triggers the forfeit flow
      }
    }else if(NET.mode==='guest'){
      guestSend({t:'hb'});
      if(NET.lastHostMsg&&now-NET.lastHostMsg>HB_TIMEOUT)hostLeft();
    }
  },HB_INTERVAL);
}
function stopHeartbeat(){if(NET.hbTimer){clearInterval(NET.hbTimer);NET.hbTimer=null;}}

function ownedBy(pid){return B.map((s,i)=>i).filter(i=>['p','rr','ut'].includes(B[i].t)&&pr(i).owner===pid);}
const GROUPORDER={brown:0,lblue:1,pink:2,orange:3,red:4,yellow:5,green:6,dblue:7};
function sortedOwned(pid){
  const k=i=>{const s=B[i];return s.t==='p'?GROUPORDER[s.g]*100+i:s.t==='rr'?800+i:900+i;};

function bankHouses(){let u=0;for(const st of state.props){if(st.houses>0&&st.houses<5)u+=st.houses;}return 32-u;}
function bankHotels(){let u=0;for(const st of state.props){if(st.houses===5)u++;}return 12-u;}
function offerHash(s){let h=2166136261;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),16777619);}return h>>>0;}
function countOwned(pid,idxs){return idxs.filter(i=>pr(i).owner===pid).length;}
function liquidWorth(pl){
  let w=pl.cash;
  for(const i of ownedBy(pl.id)){
    const st=pr(i),s=B[i];
    if(!st.mortgaged) w+=s.p/2;
    if(st.houses>0) w+=st.houses*(s.h||0)/2;
  }
  return w;
}
function netWorth(pl){
  let w=pl.cash;
  for(const i of ownedBy(pl.id)){
    const st=pr(i),s=B[i];
    w+=st.mortgaged?s.p/2:s.p;
    w+=st.houses*(s.h||0);
  }
  return w;
}

/* ---------- EVENT TOASTS: big moments pop up for everyone, phrased per viewer ---------- */
function toast(html,kind,ms){
  const box=$('toasts');
  if(!box)return;
  const d=document.createElement('div');
  d.className='toast '+(kind||'info');
  d.innerHTML=html;
  box.appendChild(d);
  while(box.children.length>3)box.firstChild.remove();
  setTimeout(()=>{d.classList.add('out');setTimeout(()=>d.remove(),320);},ms||2400);
}
function nameFor(seat){return seat===NET.seat?'You':P(seat).name;}
function showEvent(ev){
  if(!state)return;
  switch(ev.k){
    case 'pay':{
      const from=nameFor(ev.from), to=ev.to==null?'the bank':nameFor(ev.to);
      const kind=ev.from===NET.seat?'bad':ev.to===NET.seat?'good':'info';
      toast('💸 <b>'+from+'</b> paid <b>'+fmt(ev.amt)+'</b> to <b>'+to+'</b>'+(ev.what?'<small>'+ev.what+'</small>':''),kind);
      break;
    }
    case 'jail': toast('🚔 <b>'+nameFor(ev.who)+'</b> '+(ev.who===NET.seat?'go':'goes')+' to Jail!','jail',2800); break;
    case 'free': toast('🔓 <b>'+nameFor(ev.who)+'</b> — out of Jail!','jail',1800); break;
    case 'go': toast('💰 <b>'+nameFor(ev.who)+'</b> collected $200 salary','good',1500); break;
    case 'buy': toast('🏷️ <b>'+nameFor(ev.who)+'</b> bought <b>'+ev.prop+'</b> for '+fmt(ev.amt),ev.who===NET.seat?'good':'info'); break;
    case 'bankrupt': toast('💥 <b>'+nameFor(ev.who)+'</b> — BANKRUPT!','bad',3400); break;
    case 'tradeStart': toast('🤝 <b>'+nameFor(ev.from)+'</b> is proposing a trade to <b>'+nameFor(ev.to)+'</b>…','info',2200); break;
    case 'tradeDone': toast('🤝 <b>Trade!</b> '+nameFor(ev.from)+' gave: '+ev.gaveTxt+'<small>⇄ '+nameFor(ev.to)+' gave: '+ev.gotTxt+'</small>','good',4200); break;
    case 'tradeNo': toast('🤝 <b>'+nameFor(ev.to)+'</b> declined '+nameFor(ev.from)+'’s trade','info',2200); break;
  }
}
function announce(ev){
  showEvent(ev);
  if(NET.mode==='host')hostBroadcast({t:'ev',ev:ev});
}
/* ================= BOARD RENDER ================= */
function cellPos(i){
  if(i===0)return[11,11]; if(i<10)return[11,11-i];
  if(i===10)return[11,1]; if(i<20)return[21-i,1];
  if(i===20)return[1,1]; if(i<30)return[1,i-19];
  if(i===30)return[1,11]; return[i-29,11];
}
function sideClass(i){
  if(i%10===0)return'corner';
  if(i<10)return'bottom'; if(i<20)return'left'; if(i<30)return'top'; return'right';
}
function buildBoard(){
  const bd=$('board'); bd.innerHTML='';
  const center=document.createElement('div');
  center.id='center';
  center.innerHTML='<div class="logo">MONOPOLY</div><div class="vs">head to head</div>'+
    '<div id="turnbanner"></div>'+
    '<div id="dicebox"><div class="die" id="die0">'+'<i></i>'.repeat(9)+'</div><div class="die" id="die1">'+'<i></i>'.repeat(9)+'</div></div>'+
    '<div id="dicehint"></div>'+
    '<div id="cardshow"><div class="ct"></div><div class="cb"></div></div>';
  bd.appendChild(center);
  B.forEach((s,i)=>{
    const c=document.createElement('div');
    const[r,col]=cellPos(i);
    c.style.gridRow=r; c.style.gridColumn=col;
    c.className='cell '+sideClass(i);
    c.dataset.idx=i;
    let inner='';
    if(s.t==='p'){
      inner='<div class="bar bg-'+s.g+'"><div class="houses"></div></div><div class="body"><div class="nm">'+s.n.replace(' Avenue',' Ave').replace(' Place',' Pl')+'</div><div class="pr">'+fmt(s.p)+'</div></div>';
    }else if(s.t==='rr'){
      inner='<div class="body"><div class="nm">'+s.n+'</div><div class="ic">🚂</div><div class="pr">'+fmt(s.p)+'</div></div>';
    }else if(s.t==='ut'){
      inner='<div class="body"><div class="nm">'+s.n+'</div><div class="ic">'+(i===12?'💡':'🚰')+'</div><div class="pr">'+fmt(s.p)+'</div></div>';
    }else if(s.t==='ch'){
      inner='<div class="body"><div class="nm">Chance</div><div class="ic" style="color:#e6640e;font-weight:900;font-size:26px">?</div></div>';
    }else if(s.t==='cc'){
      inner='<div class="body"><div class="nm">Community Chest</div><div class="ic">📦</div></div>';
    }else if(s.t==='tax'){
      inner='<div class="body"><div class="nm">'+s.n+'</div><div class="ic">'+(i===4?'💸':'💎')+'</div><div class="pr">Pay '+fmt(s.amt)+'</div></div>';
    }else if(s.t==='go'){
      inner='<div class="nm">GO</div><div class="ic">➡️</div><div class="pr" style="font-size:8px">Collect $200</div>';
    }else if(s.t==='jail'){
      inner='<div class="nm">Jail</div><div class="ic">🚔</div><div class="pr" style="font-size:8px">Just visiting</div>';
    }else if(s.t==='fp'){
      inner='<div class="nm">Free Parking</div><div class="ic">🅿️</div>';
    }else{
      inner='<div class="nm">Go To Jail</div><div class="ic">👮</div>';
    }
    c.innerHTML=inner+'<div class="tok"></div>';
    c.onclick=()=>showSpaceInfo(i);
    bd.appendChild(c);
  });

function refresh(){
  if(!state)return;
  document.querySelectorAll('.cell').forEach(c=>{
    const i=+c.dataset.idx, st=pr(i);
    c.classList.remove('own0','own1','own2','own3','mtg','active');
    if(st&&st.owner!==null){c.classList.add('own'+st.owner); if(st.mortgaged)c.classList.add('mtg');}
    const hz=c.querySelector('.houses');
    if(hz){hz.innerHTML=st.houses===5?'<div class="hotel"></div>':'<div class="h"></div>'.repeat(st.houses);}
    const tk=c.querySelector('.tok');
    tk.innerHTML='';
    state.players.forEach(p=>{if(!state.over&&!p.bankrupt&&p.pos===i)tk.innerHTML+='<span class="tokb t'+p.id+'">'+p.token+'</span>';});
    if(state.players[state.turn]&&!state.players[state.turn].bankrupt&&state.players[state.turn].pos===i&&!state.over)c.classList.add('active');
  });
  const pv=$('players'); pv.innerHTML='';
  const chipHTML=i=>{
    const s=B[i],st=pr(i);
    const cm=st.mortgaged?' cm':'';
    if(s.t==='rr')return '<div class="chip rrchip'+cm+'" data-i="'+i+'" title="'+s.n+'">🚂</div>';
    if(s.t==='ut')return '<div class="chip utchip'+cm+'" data-i="'+i+'" title="'+s.n+'">'+(i===12?'💡':'🚰')+'</div>';
    return '<div class="chip'+cm+'" data-i="'+i+'" title="'+s.n+'" style="background:'+GROUPCOL[s.g]+'">'+(st.houses>0?'<span class="hc">'+(st.houses===5?'H':st.houses)+'</span>':'')+'</div>';
  };
  state.players.forEach(p=>{
    const d=document.createElement('div');
    d.className='pcard'+(state.turn===p.id&&!state.over&&!p.bankrupt?' turn':'')+(p.bankrupt?' dead':'');
    const owned=sortedOwned(p.id);
    let chips='';
    for(const i of owned)chips+=chipHTML(i);
    const extras=[];
    if(p.bankrupt)extras.push('BANKRUPT');
    if(p.cards.length)extras.push(p.cards.length+'× Get Out of Jail Free');
    if(p.inJail)extras.push('IN JAIL');
    const shownName=p.id===NET.seat&&online()?p.name+' (you)':p.name;
    d.innerHTML='<div class="top"><span class="tokbig">'+p.token+'</span><span class="pname" style="color:var(--p'+p.id+')">'+shownName+'</span><span class="cash">'+fmt(p.cash)+'</span></div>'+
      '<div class="meta">Net worth '+fmt(netWorth(p))+(extras.length?' · '+extras.join(' · '):'')+'</div>'+
      '<div class="chips">'+chips+'</div>';
    d.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>showSpaceInfo(+ch.dataset.i));
    pv.appendChild(d);
  });
  // the bank: everything still up for grabs, at a glance
  const groupKey=i=>{const s=B[i];return s.t==='p'?GROUPORDER[s.g]*100+i:s.t==='rr'?800+i:900+i;};
  const unowned=B.map((s,i)=>i).filter(i=>['p','rr','ut'].includes(B[i].t)&&pr(i).owner===null).sort((a,b)=>groupKey(a)-groupKey(b));
  const bk=document.createElement('div');
  bk.className='pcard bank';
  bk.innerHTML='<div class="top"><span class="tokbig">🏦</span><span class="pname">Bank</span><span class="cash" style="color:#c8b45a">'+unowned.length+' left</span></div>'+
    '<div class="meta">'+(unowned.length?'Unowned — land on one to buy it':'Every property is owned!')+'</div>'+
    '<div class="chips">'+unowned.map(chipHTML).join('')+'</div>';
  bk.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>showSpaceInfo(+ch.dataset.i));
  pv.appendChild(bk);
  $('turnbanner').textContent=state.over?'Game over':(state.turn===NET.seat?'Your turn':P(state.turn).name+'’s turn');
  if(NET.mode==='host')hostBroadcast({t:'state',s:state});
}
/* ================= DICE ================= */
const PIPS={1:[5],2:[1,9],3:[1,5,9],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};
function setDie(el,v){[...el.children].forEach((s,i)=>s.style.opacity=PIPS[v].includes(i+1)?1:0);}
async function rollDice(who){
  const d0=$('die0'),d1=$('die1');
  sfx('dice');
  if(NET.mode==='host')hostBroadcast({t:'dice',rolling:true});
  d0.classList.add('rolling');d1.classList.add('rolling');
  const end=Date.now()+650;
  while(Date.now()<end){
    setDie(d0,1+Math.floor(Math.random()*6));
    setDie(d1,1+Math.floor(Math.random()*6));
    await sleep(75);
  }
  d0.classList.remove('rolling');d1.classList.remove('rolling');
  const a=1+Math.floor(Math.random()*6),b=1+Math.floor(Math.random()*6);
  setDie(d0,a);setDie(d1,b);
  if(NET.mode==='host')hostBroadcast({t:'dice',a:a,b:b});
  state.lastDice=a+b;
  if(who)log(who+' rolled '+a+' + '+b+' = '+(a+b)+(a===b?' (doubles!)':''),'g');
  return[a,b];
}
function guestDice(m){
  const d0=$('die0'),d1=$('die1');
  if(m.rolling){sfx('dice');d0.classList.add('rolling');d1.classList.add('rolling');return;}
  d0.classList.remove('rolling');d1.classList.remove('rolling');
  if(m.a){setDie(d0,m.a);setDie(d1,m.b);}
}
/* ================= UI PRIMITIVES ================= */
function armDice(fn){
  const db=$('dicebox');
  if(!db)return;
  db.classList.add('canroll');
  db.onclick=fn;
  const h=$('dicehint');
  if(h)h.textContent='🎲 Click the dice to roll!';
}
function disarmDice(){
  const db=$('dicebox');
  if(db){db.classList.remove('canroll');db.onclick=null;}
  const h=$('dicehint');
  if(h)h.textContent='';
}
function uiButtons(btns){
  return new Promise(res=>{
    const area=$('actions'); area.innerHTML='';
    const finish=v=>{area.innerHTML='';disarmDice();res(v);};
    btns.forEach(b=>{
      const e=document.createElement('button');
      e.className='abtn '+(b.cls||'');
      e.textContent=b.label;
      if(b.disabled)e.disabled=true;
      e.onclick=()=>finish(b.value);
      area.appendChild(e);
    });
    // if a roll is on offer, the dice themselves become the big shiny button
    const rollBtn=btns.find(b=>(b.value==='roll'||b.value==='jailroll')&&!b.disabled);
    if(rollBtn)armDice(()=>finish(rollBtn.value));
  });
}
function showModal(html){$('modal').innerHTML=html;$('overlay').classList.add('show');return $('modal');}
function closeModal(){$('overlay').classList.remove('show');NET.manageRerender=null;}
/* ================= IO LAYER (local vs remote player) ================= */
async function ioButtons(pid,opts){
  if(isLocalSeat(pid))return uiButtons(opts);
  return rpc(pid,{k:'buttons',opts:opts.map(o=>({label:o.label,value:o.value,cls:o.cls,disabled:!!o.disabled}))});
}
async function ioBid(pid,i,bid,leader){
  if(isLocalSeat(pid))return openBid(pid,i,bid,leader);
  return rpc(pid,{k:'bid',i:i,bid:bid,leader:leader});
}
async function ioManage(pid,debt){
  if(isLocalSeat(pid))return openManage(pid,debt||0);
  NET.manageSession={seat:pid,debt:debt||0};
  const ok=await rpc(pid,{k:'manage',debt:debt||0});
  NET.manageSession=null;
  if(debt&&ok&&P(pid).cash<debt&&!P(pid).bankrupt)return ioManage(pid,debt);
  return !!ok;
}
async function ioTradeCompose(pid,other){
  if(isLocalSeat(pid))return openTradeCompose(pid,other);
  return rpc(pid,{k:'tradeCompose',other:other});
}
async function ioTradeDecide(pid,offer,proposerName){
  if(isLocalSeat(pid))return openTradeDecide(pid,offer,proposerName);
  return rpc(pid,{k:'tradeDecide',offer:offer,proposerName:proposerName});
}
/* ================= MOVEMENT ================= */
async function moveSteps(pl,n){
  for(let k=0;k<n;k++){
    pl.pos=(pl.pos+1)%40;
    if(pl.pos===0){pl.cash+=200;sfx('cash');log(pl.name+' passed GO — collect $200.',pl.id);announce({k:'go',who:pl.id});}
    refresh();
    await sleep(120);
  }
}
async function moveDirectTo(pl,target){
  while(pl.pos!==target)await moveSteps(pl,1);
}
async function goToJail(pl){
  pl.pos=10;pl.inJail=true;pl.jailTurns=0;
  sfx('jail');
  log(pl.name+' — straight to Jail. 🚔',pl.id);
  announce({k:'jail',who:pl.id});
  say(pl,'jail');
  refresh();
  await sleep(500);
}
/* ================= RENT & LANDING ================= */
function calcRent(i,dice,flags){
  const s=B[i],st=pr(i),o=st.owner;
  if(s.t==='p'){
    if(st.houses>0)return s.r[st.houses];
    return hasMonopoly(o,s.g)?s.r[0]*2:s.r[0];
  }
  if(s.t==='rr'){
    const n=RRS.filter(j=>pr(j).owner===o).length;
    return 25*Math.pow(2,n-1)*(flags&&flags.rr2?2:1);
  }
  const both=UTS.every(j=>pr(j).owner===o);
  return (both?10:4)*dice;
}
async function landOn(pl,dice,flags){
  flags=flags||{};
  if(dead(pl))return;
  const i=pl.pos,s=B[i],st=pr(i);
  await sleep(250);
  switch(s.t){
    case 'p':case 'rr':case 'ut':
      if(st.owner===null){await offerProperty(pl,i);}
      else if(st.owner!==pl.id){
        if(st.mortgaged){log(s.n+' is mortgaged — no rent due.','g');break;}
        let rent;
        if(s.t==='ut'&&flags.utCard){
          const[a,b]=await rollDice(pl.name+' (utility card)');
          rent=10*(a+b);
        }else rent=calcRent(i,dice,flags);
        const owner=P(st.owner);
        log(pl.name+' landed on '+s.n+' — rent is '+fmt(rent)+'.',pl.id);
        const ok=await charge(pl,rent,owner,'rent for '+s.n);
        if(ok){ if(owner.ai)say(owner,'rentIn',0.65); else if(pl.ai)say(pl,'rentOut',0.65); }
      }else log(pl.name+' landed on '+(pl.id===NET.seat?'your':'their')+' own '+s.n+'.','g');
      break;
    case 'tax':
      log(pl.name+' landed on '+s.n+' — pay '+fmt(s.amt)+'.',pl.id);
      await charge(pl,s.amt,null,s.n);
      break;
    case 'ch': await drawCard('chance',pl); break;
    case 'cc': await drawCard('chest',pl); break;
    case 'gtj': await goToJail(pl); break;
    case 'go': log(pl.name+' landed on GO.','g'); break;
    case 'jail': log(pl.name+' — just visiting jail.','g'); break;
    case 'fp': log(pl.name+' rests at Free Parking. (No payout — official rules.)','g'); break;
  }
  refresh();
}
/* ================= MONEY & BANKRUPTCY ================= */
async function charge(pl,amount,to,what){
  if(dead(pl))return false;
  if(pl.cash<amount){
    log(pl.name+' needs to raise '+fmt(amount-pl.cash)+' to cover '+(what||'the payment')+'.',pl.id);
    const ok=pl.ai?aiRaiseFunds(pl,amount):await humanRaiseFunds(pl,amount);
    if(!ok){await bankrupt(pl,to);return false;}
  }
  pl.cash-=amount;
  if(to)to.cash+=amount;
  sfx('pay');
  log(pl.name+' paid '+fmt(amount)+(to?' to '+to.name:'')+'.',pl.id);
  announce({k:'pay',from:pl.id,to:to?to.id:null,amt:amount,what:what||''});
  refresh();
  return true;
}
async function humanRaiseFunds(pl,amount){
  if(liquidWorth(pl)<amount){
    log(pl.name+'’s total assets cannot cover '+fmt(amount)+'.','g');
    return false;
  }
  return await ioManage(pl.id,amount);
}
async function bankrupt(pl,creditor){
  if(pl.bankrupt)return;
  pl.bankrupt=true;
  pl.inJail=false;
  // liquidate: buildings sell to the bank at half; deeds go to the creditor (or back to the bank)
  let salvage=pl.cash;
  pl.cash=0;
  for(const i of ownedBy(pl.id)){
    const st=pr(i),s=B[i];
    salvage+=st.houses*(s.h||0)/2;
    st.houses=0;
    if(creditor&&!creditor.bankrupt){st.owner=creditor.id;}
    else{st.owner=null;st.mortgaged=false;}
  }
  while(pl.cards.length){
    const d=pl.cards.shift();
    if(creditor&&!creditor.bankrupt)creditor.cards.push(d);
    else{const defs=d==='chance'?CHANCE:CHEST;state.decks[d].push(defs.findIndex(c=>c.gooj));}
  }
  log('💥 '+pl.name+' is BANKRUPT!','g');
  announce({k:'bankrupt',who:pl.id});
  say(pl,'myBankrupt');
  if(creditor&&!creditor.bankrupt&&salvage>0){creditor.cash+=salvage;log(creditor.name+' receives '+pl.name+'’s remaining assets ('+fmt(salvage)+' plus deeds).','g');}
  else if(salvage>0)log(pl.name+'’s properties return to the bank.','g');
  refresh();
  const rem=alive();
  if(rem.length>1){
    const witness=(creditor&&creditor.ai&&!creditor.bankrupt)?creditor:rem.find(p=>p.ai);
    if(witness)say(witness,'oppBankrupt',0.85);
  }
  if(rem.length<=1){
    state.over=true;
    refresh();
    if(NET.mode==='solo')clearSave();
    const winner=rem[0]||pl;
    say(winner,'victory');
    if(NET.mode==='host')hostBroadcast({t:'over',w:winner.id});
    await sleep(600);
    gameOverModal(winner.id,pl.name);
    $('actions').innerHTML='';
    disarmDice();
    status('');
  }else{
    save();
  }
}
function gameOverModal(w,loserName){
  const youWon=w===NET.seat;
  sfx(youWon?'win':'lose');
  const winner=P(w);
  const title=youWon?'🏆 YOU WIN!':'🏆 '+winner.name.toUpperCase()+' WINS!';
  showModal(
    '<div id="gameover-banner">'+title+'</div>'+
    '<p style="text-align:center;color:#aeb9c6">'+loserName+' went bankrupt — '+(youWon?'you are':winner.name+' is')+' the last landlord standing.</p>'+
    '<h3 style="text-align:center;margin-top:14px">Final net worth — '+state.players.map(p=>p.name+': '+fmt(netWorth(p))).join(' · ')+'</h3>'+
    '<div class="mbtns" style="justify-content:center"><button class="abtn primary" id="again">Play Again</button></div>'
  );
  $('again').onclick=()=>{closeModal();if(online())teardownNet();startScreen();};
}
/* ================= BUY / AUCTION ================= */
async function offerProperty(pl,i){
  const s=B[i];
  if(pl.ai){
    if(aiWantsBuy(i,pl.id)){
      if(pl.cash<s.p)aiRaiseFunds(pl,s.p);
      if(pl.cash>=s.p){
        pl.cash-=s.p;pr(i).owner=pl.id;
        sfx('cash');
        log(pl.name+' bought '+s.n+' for '+fmt(s.p)+'.',pl.id);
        announce({k:'buy',who:pl.id,prop:s.n,amt:s.p});
        say(pl,'buy',0.75);
        refresh();return;
      }
    }
    log(pl.name+' declined '+s.n+' — it goes to auction.',pl.id);
    await auction(i);
    return;
  }
  log(pl.name+' landed on unowned '+s.n+' ('+fmt(s.p)+').',pl.id);
  while(!dead(pl)){
    const c=await ioButtons(pl.id,[
      {label:'Buy '+s.n+' — '+fmt(s.p),value:'buy',cls:'primary',disabled:pl.cash<s.p},
      {label:'Send to Auction',value:'auction'},
      {label:'🏠 Manage (raise cash)',value:'manage'},
    ]);
    if(dead(pl))return;
    if(c==='manage'){await ioManage(pl.id,0);continue;}
    if(c==='buy'&&pl.cash>=s.p){
      pl.cash-=s.p;pr(i).owner=pl.id;
      sfx('cash');
      log(pl.name+' bought '+s.n+' for '+fmt(s.p)+'.',pl.id);
      announce({k:'buy',who:pl.id,prop:s.n,amt:s.p});
      refresh();return;
    }
    if(c==='buy')continue;
    await auction(i);return;
  }
}
function aiAuctionMax(i,seat){
  const s=B[i],me=P(seat);
  let mult=0.9;
  const oppCompletes=alive().some(p=>p.id!==seat&&completesFor(p.id,i));
  if(completesFor(seat,i))mult=1.6;
  else if(oppCompletes)mult=1.35; // blocking value
  else if(s.t==='rr'){
    const own=countOwned(seat,RRS.filter(j=>j!==i));
    const oppRR=Math.max(...alive().filter(p=>p.id!==seat).map(p=>countOwned(p.id,RRS.filter(j=>j!==i))).concat([0]));
    mult=1.05+0.25*own+(oppRR>=2?0.2:0);
  }
  else if(countOwned(seat,s.g?groupIdxs(s.g):[])===1)mult=1.05;
  mult*=persona(me).bidNerve*diff().auctionMul; // personality + difficulty: how hard they lean into auctions
  return Math.min(Math.floor(s.p*mult),me.cash-50);

async function auction(i){
  const s=B[i];
  log('🔨 '+s.n+' is up for auction!','g');
  const parts=alive().map(p=>p.id);
  const out={};parts.forEach(x=>out[x]=false);
  const aiMax={};parts.forEach(x=>{if(P(x).ai)aiMax[x]=aiAuctionMax(i,x);});
  let bid=0,leader=null;
  let idx=(parts.indexOf(state.turn)+1)%parts.length; // player after the current one opens
  let guard=400;
  while(guard-->0){
    const remaining=parts.filter(x=>!out[x]);
    if(remaining.length===0)break;
    if(leader!==null&&remaining.length===1&&remaining[0]===leader)break;
    const seat=parts[idx];idx=(idx+1)%parts.length;
    if(out[seat]||leader===seat||P(seat).bankrupt)continue;
    if(P(seat).ai){
      const step=bid<100?10:bid<300?20:50;
      const nb=bid+step;
      if(nb<=aiMax[seat]&&nb<=P(seat).cash){bid=nb;leader=seat;log(P(seat).name+' bids '+fmt(bid)+'.',seat);await sleep(420);}
      else{out[seat]=true;log(P(seat).name+' passes.',seat);}
    }else{
      const r=await ioBid(seat,i,bid,leader);
      if(typeof r!=='number'||r<bid+1||r>P(seat).cash){out[seat]=true;log(P(seat).name+' passes.',seat);}
      else{bid=Math.floor(r);leader=seat;log(P(seat).name+' bids '+fmt(bid)+'.',seat);}
    }
  }
  closeModal();
  if(leader===null){log('No bids — '+s.n+' stays with the bank.','g');return;}
  const w=P(leader);
  w.cash-=bid;pr(i).owner=leader;
  sfx('cash');
  log(w.name+' won the auction for '+s.n+' at '+fmt(bid)+'!',leader);
  announce({k:'buy',who:leader,prop:s.n+' (auction)',amt:bid});
  say(w,'buy',0.75);
  refresh();
}

function tradeable(i,pid){
  const s=B[i],st=pr(i);
  if(st.owner!==pid)return false;
  if(s.t==='p'&&groupIdxs(s.g).some(j=>pr(j).houses>0))return false;

function completesFor(pid,i){

function aiValue(i,newOwner){
  const s=B[i],st=pr(i);
  let v=s.p;
  if(s.t==='p'){
    if(completesFor(newOwner,i))v*=2.3;
    else{
      const others=countOwned(newOwner,groupIdxs(s.g).filter(j=>j!==i));
      if(others===1)v*=1.35;
    }
  }else if(s.t==='rr'){
    const n=countOwned(newOwner,RRS.filter(j=>j!==i));
    v*=1+0.3*n;
  }else{
    if(countOwned(newOwner,UTS.filter(j=>j!==i))===1)v*=1.3;
  }
  if(st.mortgaged)v-=s.p*0.55;
  return v;
}
// evaluates an offer from `proposerSeat` from `seat`'s point of view.
// offer.give = what the proposer hands over (seat's gain); offer.get = what seat hands over.
function aiEvaluateTrade(seat,offer,proposerSeat){
  const cardsIn=offer.cardsGive||0,cardsOut=offer.cardsGet||0;
  let gain=(offer.cashGive||0)+25*cardsIn,loss=(offer.cashGet||0)+25*cardsOut;
  for(const i of offer.give)gain+=aiValue(i,seat);
  for(const i of offer.get)loss+=aiValue(i,proposerSeat);
  const d=diff();
  if(P(seat).cash-(offer.cashGet||0)<80)return{ok:false,kind:'soft'};
  if(gain>=loss*d.tThresh+10)return{ok:true};
  // flexibility is deterministic per offer — re-proposing the same deal always gets the same answer
  const key=seat+'<'+proposerSeat+'|'+offer.give.join(',')+'|'+offer.get.join(',')+'|'+(offer.cashGive||0)+'|'+(offer.cashGet||0)+'|'+cardsIn+'|'+cardsOut;
  if(gain>=loss*d.tFlexBand&&offerHash(key)%100<d.tFlexPct)return{ok:true};
  return{ok:false,kind:loss>gain*1.5?'hard':'soft'};
}
function validOffer(seat,o){
  if(!o||typeof o!=='object')return false;
  const other=+o.other;
  if(!(other>=0&&other<state.players.length)||other===seat||P(other).bankrupt)return false;
  if(!Array.isArray(o.give)||!Array.isArray(o.get))return false;
  if(o.give.some(i=>!tradeable(i,seat)))return false;
  if(o.get.some(i=>!tradeable(i,other)))return false;
  for(const k of ['cashGive','cashGet','cardsGive','cardsGet'])o[k]=Math.max(0,Math.floor(+o[k]||0));
  if(o.cashGive>P(seat).cash||o.cashGet>P(other).cash)return false;
  if(o.cardsGive>P(seat).cards.length||o.cardsGet>P(other).cards.length)return false;
  if(o.give.length+o.get.length+o.cardsGive+o.cardsGet===0&&o.cashGive===0&&o.cashGet===0)return false;
  return true;
}
function sideTxt(props,cash,cards){
  const parts=props.map(i=>B[i].n);
  if(cash)parts.push(fmt(cash));
  if(cards)parts.push(cards+'× jail card');
  return parts.join(', ')||'nothing';
}
function applyTrade(seat,o){
  const other=+o.other;
  for(const i of o.give)pr(i).owner=other;
  for(const i of o.get)pr(i).owner=seat;
  for(let k=0;k<o.cardsGive;k++)P(other).cards.push(P(seat).cards.shift());
  for(let k=0;k<o.cardsGet;k++)P(seat).cards.push(P(other).cards.shift());
  P(seat).cash+=o.cashGet-o.cashGive;
  P(other).cash+=o.cashGive-o.cashGet;
  log('Trade completed: '+P(seat).name+' gave ['+sideTxt(o.give,o.cashGive,o.cardsGive)+'] to '+P(other).name+' for ['+sideTxt(o.get,o.cashGet,o.cardsGet)+'].','g');
  announce({k:'tradeDone',from:seat,to:other,gaveTxt:sideTxt(o.give,o.cashGive,o.cardsGive),gotTxt:sideTxt(o.get,o.cashGet,o.cardsGet)});
  refresh();
  if(!state.pendingRoll)save();
}

async function doTrade(seat){
  const opps=alive().filter(p=>p.id!==seat);
  if(opps.length===0)return;
  let other;
  if(opps.length===1)other=opps[0].id;
  else{
    const c=await ioButtons(seat,opps.map(p=>({label:'🤝 Trade with '+p.name,value:'s'+p.id})).concat([{label:'Cancel',value:'x'}]));
    if(c==null||c==='x')return;
    other=+String(c).slice(1);
    if(!(other>=0)||!alive().some(p=>p.id===other))return;
  }
  const offer=await ioTradeCompose(seat,other);
  if(!offer)return;
  offer.other=other;
  if(!validOffer(seat,offer)){log('Trade offer was invalid.','g');return;}
  let ok,kind='soft';
  const target=P(other);
  if(target.ai){
    const v=aiEvaluateTrade(other,offer,seat);
    ok=v.ok;kind=v.kind||'soft';
  }else{
    log(P(seat).name+' proposes a trade — waiting for '+target.name+'…','g');
    announce({k:'tradeStart',from:seat,to:other});
    ok=await ioTradeDecide(other,offer,P(seat).name);
    if(!validOffer(seat,offer))ok=false;
  }
  if(ok){
    applyTrade(seat,offer);
    say(target,'tradeAccept');
  }else{
    announce({k:'tradeNo',from:seat,to:other});
    if(target.ai)say(target,kind==='hard'?'tradeHardNo':'tradeSoftNo');
    else log(target.name+' declined the trade.','g');
  }
}
function findAIProposal(seat){
  const groups=[...new Set(B.filter(s=>s.t==='p').map(s=>s.g))];
  // a group I could complete, missing piece held by opponent o
  for(const g of groups){
    const gi=groupIdxs(g);
    if(countOwned(seat,gi)!==gi.length-1)continue;
    const missing=gi.find(j=>pr(j).owner!==seat);
    const o=pr(missing).owner;
    if(o===null||o===seat||P(o).bankrupt||!tradeable(missing,o))continue;
    // find something o could complete that I hold
    for(const g2 of groups){
      const gj=groupIdxs(g2);
      if(countOwned(o,gj)!==gj.length-1)continue;
      const giveIdx=gj.find(j=>pr(j).owner!==o);
      if(giveIdx===undefined||pr(giveIdx).owner!==seat||!tradeable(giveIdx,seat))continue;
      const key=seat+':'+missing+'-'+giveIdx;
      if(state.proposed[key])continue;
      let cash=Math.max(0,B[missing].p-B[giveIdx].p);
      cash=Math.min(cash+50,P(seat).cash-150);
      if(cash<0)cash=0;
      return{want:missing,give:giveIdx,cash:cash,key:key,o:o};
    }
  }
  return null;
}
async function aiMaybePropose(pl){
  if(!diff().seek)return; // easy bots never initiate trades — a big, deliberate handicap
  const pr_=findAIProposal(pl.id);
  if(!pr_)return;
  state.proposed[pr_.key]=true;
  const offer={other:pr_.o,give:[pr_.give],get:[pr_.want],cashGive:pr_.cash,cashGet:0,cardsGive:0,cardsGet:0};
  const target=P(pr_.o);
  if(target.ai){
    const v=aiEvaluateTrade(pr_.o,offer,pl.id);
    if(v.ok){applyTrade(pl.id,offer);say(target,'tradeAccept',0.8);}
    return;
  }
  say(pl,'tradeOffer');
  announce({k:'tradeStart',from:pl.id,to:pr_.o});
  await sleep(400);
  const accepted=await ioTradeDecide(pr_.o,offer,pl.name);
  if(accepted){
    applyTrade(pl.id,offer);
    say(pl,'tradeAccept');
  }else{
    announce({k:'tradeNo',from:pl.id,to:pr_.o});
    say(pl,'tradeWithdraw');
  }
}
/* ================= AI BRAIN ================= */
function threatFor(seat){
  let maxRent=0;
  for(const p of alive()){
    if(p.id===seat)continue;
    for(const i of ownedBy(p.id)){
      const s=B[i],st=pr(i);
      if(st.mortgaged)continue;
      const r=s.t==='p'?(st.houses>0?s.r[st.houses]:hasMonopoly(p.id,s.g)?s.r[0]*2:s.r[0]):calcRent(i,7);
      if(r>maxRent)maxRent=r;
    }
  }
  return maxRent;
}
function aiReserve(seat){
  return Math.floor(Math.min(600,Math.max(120,threatFor(seat)*0.8))*diff().reserveMul);
}
function aiWantsBuy(i,seat){
  const s=B[i],me=P(seat);
  const key=completesFor(seat,i)||alive().some(p=>p.id!==seat&&completesFor(p.id,i))||s.t==='rr';
  if(key)return liquidWorth(me)-s.p>=60; // completing/blocking a set is always worth it, any difficulty
  return me.cash-s.p>=Math.max(100,aiReserve(seat)*0.5)*diff().buyMul;
}
function aiRaiseFunds(pl,target){
  const seat=pl.id;
  const tries=[
    i=>B[i].t==='p'&&!hasMonopoly(seat,B[i].g)&&canMortgage(i,seat),
    i=>B[i].t==='ut'&&canMortgage(i,seat),
    i=>B[i].t==='rr'&&canMortgage(i,seat),
  ];
  for(const test of tries){
    for(const i of ownedBy(seat)){
      if(pl.cash>=target)return true;
      if(test(i)){pr(i).mortgaged=true;pl.cash+=B[i].p/2;log(pl.name+' mortgaged '+B[i].n+' for '+fmt(B[i].p/2)+'.',seat);}
    }
  }
  let guard=100;
  while(pl.cash<target&&guard-->0){
    const cand=ownedBy(seat).filter(i=>canSellHouse(i,seat)).sort((a,b)=>pr(b).houses-pr(a).houses)[0];
    if(cand===undefined)break;
    pr(cand).houses--;pl.cash+=B[cand].h/2;
    log(pl.name+' sold a building on '+B[cand].n+'.',seat);
  }
  for(const i of ownedBy(seat)){
    if(pl.cash>=target)break;
    if(canMortgage(i,seat)){pr(i).mortgaged=true;pl.cash+=B[i].p/2;log(pl.name+' mortgaged '+B[i].n+'.',seat);}
  }
  refresh();
  return pl.cash>=target;
}
function aiManageEconomy(pl){
  const seat=pl.id;
  const buildReserve=Math.floor(Math.max(80,Math.min(350,threatFor(seat)*0.5))*diff().buildMul);
  for(const i of ownedBy(seat)){
    const s=B[i];
    if(pr(i).mortgaged&&s.g&&hasMonopoly(seat,s.g)&&pl.cash-unmortgageCost(i)>=buildReserve){
      pl.cash-=unmortgageCost(i);pr(i).mortgaged=false;
      log(pl.name+' unmortgaged '+s.n+'.',seat);
    }
  }
  const prio=persona(pl).buildPrio; // personality: which sets they develop first
  let built=0,guard=80;
  while(guard-->0){
    let done=true;
    for(const g of prio){
      if(!hasMonopoly(seat,g))continue;
      const cand=groupIdxs(g).filter(i=>canBuyHouse(i,seat)&&pl.cash-B[i].h>=buildReserve)
        .sort((a,b)=>pr(a).houses-pr(b).houses)[0];
      if(cand!==undefined){
        pl.cash-=B[cand].h;pr(cand).houses++;built++;
        log(pl.name+' built a '+(pr(cand).houses===5?'hotel':'house')+' on '+B[cand].n+'.',seat);
        done=false;break;
      }
    }
    if(done)break;
  }
  if(built>0){sfx('build');say(pl,'build',0.8);}
  const spare=aiReserve(seat)+200;
  const morts=ownedBy(seat).filter(i=>pr(i).mortgaged)
    .sort((a,b)=>((B[a].t==='rr'?0:1)-(B[b].t==='rr'?0:1))||B[a].p-B[b].p);
  for(const i of morts){
    if(pl.cash-unmortgageCost(i)<spare)continue;
    pl.cash-=unmortgageCost(i);pr(i).mortgaged=false;
    log(pl.name+' unmortgaged '+B[i].n+'.',seat);
  }
  refresh();
}
/* ================= HUMAN TURN (any human seat, local or remote) ================= */
async function humanTurn(pl){
  const pid=pl.id;
  status(isLocalSeat(pid)?'Your turn!':'Waiting for '+pl.name+'…');
  if(!isLocalSeat(pid))$('actions').innerHTML='';
  let rolled=state.phase==='post';
  if(!rolled&&state.pendingRoll){
    const pend=state.pendingRoll;
    log('Resuming '+pl.name+'’s interrupted roll: '+pend.a+' + '+pend.b+'.',pid);
    setDie($('die0'),pend.a);setDie($('die1'),pend.b);
    if(pend.jail)await humanJailRoll(pl,pend.a,pend.b);
    else await humanRollChain(pl,[pend.a,pend.b]);
    rolled=true;
  }
  while(!rolled&&!dead(pl)){
    const opts=[];
    if(pl.inJail){
      opts.push({label:'🎲 Roll for Doubles ('+(pl.jailTurns+1)+'/3)',value:'jailroll',cls:'primary'});
      opts.push({label:'Pay $50 Bail',value:'bail',disabled:pl.cash<50});
      if(pl.cards.length>0)opts.push({label:'Use Get Out of Jail Free',value:'card'});
    }else{
      opts.push({label:'🎲 Roll Dice',value:'roll',cls:'primary'});
    }
    opts.push(manageBtn(pid));
    opts.push({label:'🤝 Trade',value:'trade'});
    const c=await ioButtons(pid,opts);
    if(dead(pl))return;
    if(c==='manage'){await ioManage(pid,0);continue;}
    if(c==='trade'){await doTrade(pid);continue;}
    if(c==='bail'&&pl.inJail&&pl.cash>=50){pl.cash-=50;pl.inJail=false;pl.jailTurns=0;log(pl.name+' paid $50 bail.',pid);refresh();continue;}
    if(c==='card'&&pl.inJail&&pl.cards.length>0){useJailCard(pl);refresh();continue;}
    if(c==='jailroll'&&pl.inJail){
      const[a,b]=await rollDice(pl.name+' (in jail)');
      state.pendingRoll={a:a,b:b,jail:1};save();
      await humanJailRoll(pl,a,b);
      rolled=true;continue;
    }
    if(c==='roll'&&!pl.inJail){
      await humanRollChain(pl,null);
      rolled=true;
    }
  }
  if(dead(pl))return;
  if(state.phase!=='post'){state.phase='post';save();}
  while(!dead(pl)){
    const c=await ioButtons(pid,[
      {label:'End Turn ▶',value:'end',cls:'primary'},
      manageBtn(pid),
      {label:'🤝 Trade',value:'trade'},
    ]);
    if(dead(pl))return;
    if(c==='manage'){await ioManage(pid,0);continue;}
    if(c==='trade'){await doTrade(pid);continue;}
    break;
  }
  status('');
}
async function humanJailRoll(pl,a,b){
  if(a===b){
    log('Doubles — '+pl.name+' is free!',pl.id);
    announce({k:'free',who:pl.id});
    pl.inJail=false;pl.jailTurns=0;
    await moveSteps(pl,a+b);await landOn(pl,a+b);
  }else{
    pl.jailTurns++;
    if(pl.jailTurns>=3){
      log('Third failed attempt — '+pl.name+' must pay $50 bail.',pl.id);
      const ok=await charge(pl,50,null,'bail');
      if(!ok)return;
      pl.inJail=false;pl.jailTurns=0;
      await moveSteps(pl,a+b);await landOn(pl,a+b);
    }else log('No doubles — '+pl.name+' stays in jail ('+pl.jailTurns+'/3).',pl.id);
  }
  state.pendingRoll=null;
  if(!state.over)save();
}
async function humanRollChain(pl,pre){
  let doubles=0,again=true;
  while(again&&!dead(pl)){
    again=false;
    let a,b;
    if(pre){a=pre[0];b=pre[1];pre=null;}
    else{
      const r=await rollDice(pl.name);a=r[0];b=r[1];
      state.pendingRoll={a:a,b:b,jail:0};save();
    }
    if(a===b)doubles++;
    if(doubles>=3){
      log('Three doubles in a row — '+pl.name+' goes to jail!',pl.id);
      await goToJail(pl);
      state.pendingRoll=null;save();
      break;
    }
    await moveSteps(pl,a+b);
    await landOn(pl,a+b);
    state.pendingRoll=null;
    if(!state.over)save();
    if(a===b&&!pl.inJail&&!dead(pl)){
      log('Doubles — '+pl.name+' rolls again!',pl.id);
      while(true){
        const cc=await ioButtons(pl.id,[
          {label:'🎲 Roll Again',value:'roll',cls:'primary'},
          manageBtn(pl.id),
          {label:'🤝 Trade',value:'trade'},
        ]);
        if(dead(pl))return;
        if(cc==='manage'){await ioManage(pl.id,0);continue;}
        if(cc==='trade'){await doTrade(pl.id);continue;}
        break;
      }
      again=true;
    }
  }
}

    // late-game, sitting in jail dodges rent — only smart bots play it; easy ones always bolt into danger

    if(pl.cards.length>0&&!dangerous){useJailCard(pl);say(pl,'jailOut',0.5);refresh();await sleep(400);}

    else{

let gameGen=0;
async function gameLoop(){
  const gen=++gameGen;
  while(!state.over&&gen===gameGen){
    refresh();
    const cur=P(state.turn);
    try{
      if(cur.bankrupt){/* skip */}
      else if(cur.ai)await aiTurn(cur);
      else await humanTurn(cur);
    }catch(err){
      console.error(err);
      log('⚠️ Internal error ('+((err&&err.message)||err)+') — turn skipped, game continues.','g');
      closeModal();status('');
    }
    if(gen!==gameGen||state.over)break;
    let n=state.turn,guard=8;
    do{n=(n+1)%state.players.length;}while(P(n).bankrupt&&guard-->0);
    state.turn=n;
    state.turnCount++;
    state.phase='pre';
    state.pendingRoll=null;
    save();
  }
}

        state=msg.s;
        if(prevCash!==null&&state.players[NET.seat]){
          const now=state.players[NET.seat].cash;
          if(now>prevCash)sfx('cash'); else if(now<prevCash)sfx('pay');
        }
      }
      refresh();
      if(NET.manageRerender)NET.manageRerender();
      if(!NET.activeReq&&!state.over)status(state.turn===NET.seat?'':'Waiting for '+P(state.turn).name+'…');
      break;
    case 'log': appendLog(msg.m,msg.c); break;
    case 'ev': if(msg.ev)showEvent(msg.ev); break;
    case 'dice': guestDice(msg); break;
    case 'card': guestCard(msg); break;
    case 'req': handleReq(msg); break;
    case 'over': if(state){state.over=true;refresh();gameOverModal(+msg.w,'The runner-up');} break;
    case 'bye': hostLeft(); break;
  }
}
async function handleReq(msg){
  NET.activeReq=true;
  status('Your move!');
  let v=null;
  try{
    if(msg.k==='buttons')v=await uiButtons(msg.opts);
    else if(msg.k==='bid')v=await openBid(NET.seat,msg.i,msg.bid,msg.leader);
    else if(msg.k==='manage')v=await openManage(NET.seat,msg.debt);
    else if(msg.k==='tradeCompose')v=await openTradeCompose(NET.seat,+msg.other);
    else if(msg.k==='tradeDecide')v=await openTradeDecide(NET.seat,msg.offer,msg.proposerName);
  }catch(e){console.error(e);}
  NET.activeReq=false;
  status(state&&!state.over?'Waiting…':'');
  guestSend({t:'res',id:msg.id,v:v===undefined?null:v});
}

function hostLeft(){

    showModal('<h2>🔌 Host disconnected</h2><p style="color:#aeb9c6">The host’s browser runs the game, so this match is over.</p>'+

async function forfeit(seat){
  if(!state||state.over)return;
  const pl=P(seat);
  if(!pl||pl.bankrupt)return;
  delete NET.conns[seat]; // drop the dead connection before any broadcasts
  log('🔌 '+pl.name+' disconnected — they forfeit.','g');
  resolvePendingFor(seat);
  await bankrupt(pl,null);
}
/* ---- hosting ---- */
function lobbyModal(code){

    '<div class="codebig" id="roomcode" title="Click to copy">'+code+'</div>'+
    '<div class="lobbyrow">'+NET.hostToken+' <b>'+NET.hostName+'</b> <span style="color:#93a0ae">(host)</span></div>'+joined+
    '<p id="hostwait" style="color:#c8b45a;text-align:center;margin-top:8px">'+n+'/'+NET.maxPlayers+' players'+(NET.lobby.length?'':' — waiting…')+'</p>'+
    '<div class="mbtns" style="justify-content:center">'+
    '<button class="abtn" id="copycode">📋 Copy code</button>'+
    '<button class="abtn primary" id="startgame" '+(NET.lobby.length>=1?'':'disabled')+'>Start with '+n+' player'+(n>1?'s':'')+'</button>'+

  );
  const flash=()=>{const b=m.querySelector('#copycode');if(b){b.textContent='✅ Copied!';setTimeout(()=>{const bb=m.querySelector('#copycode');if(bb)bb.textContent='📋 Copy code';},1500);}};
  m.querySelector('#copycode').onclick=()=>{copyText(code);flash();};
  m.querySelector('#roomcode').onclick=()=>{copyText(code);flash();};
  m.querySelector('#hostcancel').onclick=()=>{teardownNet();closeModal();startScreen();};
  m.querySelector('#startgame').onclick=()=>{if(NET.lobby.length>=1)beginHostedGame();};
}
function lobbyChanged(code){
  if(NET.awaitingHello)lobbyModal(code);
  hostBroadcast({t:'lobby',n:NET.lobby.length+1,max:NET.maxPlayers});
  if(NET.lobby.length>=NET.maxPlayers-1)beginHostedGame();
}
function beginHostedGame(){
  if(!NET.awaitingHello)return;
  NET.awaitingHello=false;
  const used=[NET.hostToken];
  const spec=[{name:NET.hostName,token:NET.hostToken,ai:false}];
  NET.lobby.forEach((g,k)=>{
    let t=(TOKENS.includes(g.token)&&!used.includes(g.token))?g.token:TOKENS.find(x=>!used.includes(x));
    used.push(t);
    g.seat=k+1;
    NET.conns[k+1]=g.conn;
    spec.push({name:g.name,token:t,ai:false});
  });
  NET.lobby.forEach(g=>hostSendTo(g.seat,{t:'seat',seat:g.seat}));
  state=freshState(spec);
  startHeartbeat();
  closeModal();
  $('log').innerHTML='';
  log('— Online game! '+spec.map(s=>s.token+' '+s.name).join(' vs ')+'. '+NET.hostName+' goes first. —','g');
  refresh();
  gameLoop();
}
function hostGame(name,token,maxPlayers){
  NET.mode='host';NET.seat=0;NET.hostName=name;NET.hostToken=token;NET.maxPlayers=maxPlayers;
  NET.awaitingHello=true;NET.lobby=[];NET.conns={};
  const code=randCode(5);
  const peer=new Peer(ROOMPREFIX+code,PEERCFG);
  NET.peer=peer;
  lobbyModal(code);
  const hw=()=>$('hostwait');
  peer.on('open',()=>{if(hw())hw().textContent=(NET.lobby.length+1)+'/'+NET.maxPlayers+' players — waiting…';});
  peer.on('disconnected',()=>{try{peer.reconnect();}catch(e){}});
  peer.on('error',e=>{
    if(String(e.type)==='unavailable-id'){teardownNet();hostGame(name,token,maxPlayers);return;}
    if(hw())hw().textContent='Connection error: '+e.type+'. Check your internet and try again.';
  });
  peer.on('connection',c=>{
    if(!NET.awaitingHello){try{c.close();}catch(e){}return;} // game already started
    if(NET.lobby.length>=NET.maxPlayers-1){try{c.send({t:'full'});}catch(e){}setTimeout(()=>{try{c.close();}catch(e){}},400);return;}
    const guest={conn:c,name:null,token:null,seat:null};
    c.on('data',msg=>{
      c._lastSeen=Date.now();
      if(msg&&msg.t==='hello'&&guest.name===null){
        const v=+msg.v||1;
        if(v!==GAME_VERSION){
          try{c.send({t:'badver',hostV:GAME_VERSION});}catch(e){}
          log('⚠️ A player tried to join with an outdated copy (v'+v+') — asked them to update.','g');
          setTimeout(()=>{try{c.close();}catch(e){}},600);
          return;
        }
        guest.name=String(msg.name||'Friend').slice(0,20)||'Friend';
        guest.token=msg.token;
        NET.lobby.push(guest);
        try{c.send({t:'ver',v:GAME_VERSION});}catch(e){}
        lobbyChanged(code);
      }else if(guest.seat!=null)hostOnData(msg,guest.seat);
      else if(msg&&msg.t==='bye'){try{c.close();}catch(e){}}
    });
    c.on('close',()=>{
      if(guest.seat!=null)forfeit(guest.seat);
      else{
        const ix=NET.lobby.indexOf(guest);
        if(ix>=0){NET.lobby.splice(ix,1);if(NET.awaitingHello)lobbyChanged(code);}
      }
    });
    c.on('error',e=>console.error(e));
  });
}
/* ---- joining ---- */
function joinGame(name,code,token){
  NET.mode='guest';NET.seat=1;
  const m=showModal(
    '<h2>🔗 Joining game…</h2>'+
    '<p id="joinwait" style="color:#c8b45a">Connecting to room '+code+'…</p>'+
    '<div class="mbtns"><button class="abtn danger" id="joincancel">Cancel</button></div>'
  );
  m.querySelector('#joincancel').onclick=()=>{teardownNet();closeModal();startScreen();};
  const peer=new Peer(PEERCFG);
  NET.peer=peer;
  let opened=false;
  peer.on('open',()=>{
    const el=$('joinwait');
    if(el)el.textContent='Found matchmaking — knocking on room '+code+'…';
    const c=peer.connect(ROOMPREFIX+code,{reliable:true});
    NET.conns[0]=c;
    c.on('open',()=>{
      opened=true;
      NET.lastHostMsg=Date.now();
      startHeartbeat();
      $('log').innerHTML='';
      appendLog('— Connected! Waiting in the lobby… —','g');
      closeModal();
      status('In the lobby — waiting for the host to start…');
      c.send({t:'hello',name:name,token:token,v:GAME_VERSION});
    });
    c.on('data',guestOnData);
    c.on('close',()=>hostLeft());
    c.on('error',e=>console.error(e));
  });
  peer.on('disconnected',()=>{try{peer.reconnect();}catch(e){}});
  peer.on('error',e=>{
    const el=$('joinwait');
    if(el)el.textContent=String(e.type)==='peer-unavailable'?'Room "'+code+'" not found. Double-check the code (and that your friend is still on the lobby screen).':'Connection error: '+e.type+'.';
  });
  setTimeout(()=>{
    if(!opened&&NET.mode==='guest'&&$('joinwait'))
      $('joinwait').textContent='Still trying… the room was found but the direct connection is slow. If it never opens, one of you may be on a very restrictive network (some hotspots/VPNs block peer-to-peer).';
  },12000);
}

async function downloadCopy(src,ver){
  try{
    const url=src||(location.protocol.indexOf('http')===0?location.href.split('#')[0].split('?')[0]:SITE);
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok)throw new Error(res.status);
    const blob=new Blob([await res.text()],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='monopoly-1v1-v'+(ver||GAME_VERSION)+'.html';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    return true;
  }catch(e){
    alert('Could not download a copy — check your internet connection.');
    return false;
  }
}

}

function wireCountPicker(m,id,def){

    setBlurb();

    mm.querySelector('#gosolo').onclick=()=>{
      const ht=getTok();
      const nBots=getBots()+1;

      const rest=shuffle(TOKENS.filter(t=>t!==ht));
      const spec=[{name:'You',token:ht,ai:false}];
      for(let k=0;k<nBots;k++)spec.push({name:AINAMES[k],token:rest[k],ai:true});

      closeModal();

      state.players.filter(p=>p.ai).forEach(p=>say(p,'start'));
      refresh();save();gameLoop();

  m.querySelector('#mhost').onclick=()=>{

      '<input class="namein" id="pname" maxlength="20" placeholder="Your name" value="Player 1">'+

      '<div class="mbtns" style="justify-content:center"><button class="abtn primary" id="gohost">Create Room</button><button class="abtn" id="back">Back</button></div>');
    const getTok=wireTokenPicker(mm);
    const getSize=wireCountPicker(mm,'tablesize',0);
    mm.querySelector('#back').onclick=()=>startScreen();
    mm.querySelector('#gohost').onclick=()=>{
      const name=(mm.querySelector('#pname').value.trim()||'Player 1').slice(0,20);
      hostGame(name,getTok(),getSize()+2);
    };
  };
  m.querySelector('#mjoin').onclick=()=>{
    if(typeof Peer==='undefined'){alert('Online play needs an internet connection (the networking library could not load).');return;}
    const mm=showModal('<h2 style="text-align:center">🔗 Join a game</h2>'+
      '<input class="namein" id="pname" maxlength="20" placeholder="Your name" value="Player 2">'+
      '<input class="namein" id="pcode" maxlength="5" placeholder="Room code (e.g. K7KPQ)" style="text-transform:uppercase;letter-spacing:4px;font-weight:800">'+
      tokenPickerHTML()+
      '<div class="mbtns" style="justify-content:center"><button class="abtn primary" id="gojoin">Join</button><button class="abtn" id="back">Back</button></div>');
    const getTok=wireTokenPicker(mm);
    mm.querySelector('#back').onclick=()=>startScreen();
    mm.querySelector('#gojoin').onclick=()=>{
      const name=(mm.querySelector('#pname').value.trim()||'Player 2').slice(0,20);
      const code=mm.querySelector('#pcode').value.trim().toUpperCase();

function showUpdateBar(remoteV){
  const bar=$('updatebar');
  if(bar.dataset.v===String(remoteV))return;
  bar.dataset.v=String(remoteV);
  const isFile=location.protocol==='file:';
  bar.innerHTML='⬆️ Version '+remoteV+' is out (you have v'+GAME_VERSION+') —'+
    '<button id="updgo">'+(isFile?'Download new file':'Update now')+'</button>';
  bar.style.display='block';
  $('updgo').onclick=async()=>{
    if(isFile){
      const ok=await downloadCopy(SITE,remoteV);
      if(ok)bar.innerHTML='✅ v'+remoteV+' downloaded — open the new file and delete this old copy.';
    }else{
      bar.textContent='Updating…';
      try{
        const reg=await navigator.serviceWorker.getRegistration();
        if(reg){
          reg.update();
          navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
          setTimeout(()=>location.reload(),4000);
        }else location.reload();
      }catch(e){location.reload();}
    }
  };
}
async function checkForUpdate(){
  try{

    if(!r.ok)return;
    const j=await r.json();

}
